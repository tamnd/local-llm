version: "2"

linters:
  default: standard
  enable:
    - bodyclose      # HTTP response bodies must be closed; this is a proxy
    - errcheck
    - errorlint      # use errors.Is/As, not == on wrapped errors
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - usetesting     # prefer t.Context, t.Setenv in tests

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gocritic:
      disabled-checks:
        - ifElseChain  # the manager's swap state machine reads better as is

  exclusions:
    rules:
      # Test helpers may ignore errors on best-effort writes to a recorder.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/tamnd/local-llm
