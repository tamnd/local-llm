# llmgw gateway config for the RTX 4090 box. The schema is config.Config; every
# field documented here maps to a struct tag in config/config.go. A model the
# gateway should serve needs an entry under models; clients select it by the
# key (or by an alias below). VRAM numbers are the measured residency from spec
# 2065, used by the manager to decide what can coexist with the main slot.

bind:
  # api_addr binds the data plane. 0.0.0.0 is fine because the only route to this
  # port is the tailnet; the box's firewall blocks the port on every other
  # interface. Set this to the Tailscale IP to be strict.
  api_addr: "0.0.0.0:8888"
  # admin_addr stays on loopback so force-load and force-unload are unreachable
  # from the network.
  admin_addr: "127.0.0.1:8889"

auth:
  # Replace these before serving. Generate with: openssl rand -hex 24
  tokens:
    - "REPLACE_ME_data_plane_token"
  # admin_token guards /admin/*. Leave empty to disable the admin plane.
  admin_token: "REPLACE_ME_admin_token"

# default_model answers requests that omit the model field. It may be an alias.
default_model: chat

aliases:
  chat: qwen3-30b-a3b
  coder: qwen3-coder-30b-a3b
  reasoning: qwen3-32b-exl2
  embed: nomic-embed-text

models:
  # General chat and tool use. MoE, ~217-240 tok/s decode on the 4090 (spec 1991).
  qwen3-30b-a3b:
    backend: ollama
    base_url: "http://127.0.0.1:11434"
    upstream_model: "qwen3:30b-a3b"
    vram_mb: 19000
    params:
      keep_alive: "30m"

  # Code-tuned sibling, same MoE shape and footprint.
  qwen3-coder-30b-a3b:
    backend: ollama
    base_url: "http://127.0.0.1:11434"
    upstream_model: "qwen3-coder:30b-a3b"
    vram_mb: 19000
    params:
      keep_alive: "30m"

  # Dense 32B at 4bpw EXL2 through TabbyAPI, ~47-48 tok/s. Higher quality, slower.
  qwen3-32b-exl2:
    backend: tabby
    base_url: "http://127.0.0.1:5000"
    upstream_model: "Qwen3-32B-exl2-4.0bpw"
    vram_mb: 20500
    params:
      admin_key: "REPLACE_ME_tabby_admin_key"
      max_seq_len: 32768
      cache_mode: "Q8"

  # Embeddings. Small enough to stay resident alongside the main slot, so RAG
  # traffic does not evict the chat model.
  nomic-embed-text:
    backend: ollama
    base_url: "http://127.0.0.1:11434"
    upstream_model: "nomic-embed-text"
    vram_mb: 350
    coexist: true
    params:
      keep_alive: "60m"

  # ---- inproc (llama.cpp zero-proxy) entries --------------------------------
  #
  # The inproc backend loads the GGUF directly into the gateway process via CGO.
  # No Ollama subprocess, no HTTP hop. Needs `make build-llama` with libllama.so
  # on LD_LIBRARY_PATH. Measured on RTX 4090 b9780 (spec 2065 doc 18):
  #
  #   dense 32B models:  ~41 tok/s inproc vs ~26 tok/s Ollama (+59%)
  #   qwen3.6:27b (SSM): ~18.3 tok/s inproc vs ~47.5 tok/s Ollama (39%)
  #   qwen3.6:35b (MoE): ~18.9 tok/s inproc vs ~175 tok/s Ollama (11%)
  #   gpt-oss:20b (MoE): ~23.5 tok/s inproc vs ~170 tok/s Ollama (14%)
  #
  # New-arch models are slow through inproc because b9780 SSM/MoE CUDA kernel
  # paths are newly added and not yet optimized. Use the vllm entries below for
  # qwen3.6:35b and gpt-oss:20b where MoE dispatch matters.

  # Dense coder, best inproc model. Speculative decoding with a 1.7B draft can
  # push to ~60+ tok/s in greedy mode. Uncomment and set model_path.
  #
  # qwen3-coder-inproc:
  #   backend: inproc
  #   upstream_model: qwen3-coder-30b
  #   vram_mb: 21000
  #   params:
  #     model_path: "/models/gguf/Qwen3-Coder-30B-UD-Q4_K_XL.gguf"
  #     draft_path: "/models/gguf/Qwen3-1.7B-Q4_K_M.gguf"
  #     n_ctx: 32768
  #     n_gpu_layers: 99
  #     flash_attn: true
  #     cache_type_k: "q8_0"
  #     cache_type_v: "q8_0"
  #     draft_max: 6
  #     temperature: 0.0

  # qwen3.6:27b inproc - hybrid SSM/attention, 18.3 tok/s. Ollama wins here
  # until llama.cpp SSM kernels mature. Uncomment for benchmarking.
  #
  # qwen3-27b-inproc:
  #   backend: inproc
  #   upstream_model: qwen3.6:27b
  #   vram_mb: 16040
  #   params:
  #     model_path: "/mnt/c/Users/gopher/.ollama/models/blobs/sha256-83c54730a5fea..."
  #     n_ctx: 4096
  #     n_gpu_layers: 99
  #     flash_attn: true
  #     cache_type_k: "q8_0"
  #     cache_type_v: "q8_0"

  # qwen3.6:35b inproc - hybrid SSM+MoE, 18.9 tok/s. vLLM backend preferred.
  #
  # qwen3-35b-inproc:
  #   backend: inproc
  #   upstream_model: qwen3.6:35b
  #   vram_mb: 22236
  #   params:
  #     model_path: "/mnt/c/Users/gopher/.ollama/models/blobs/sha256-f5ee307a29821..."
  #     n_ctx: 4096
  #     n_gpu_layers: 99
  #     flash_attn: true
  #     cache_type_k: "q8_0"
  #     cache_type_v: "q8_0"

  # gpt-oss:20b inproc - MoE MXFP4, 23.5 tok/s. vLLM backend preferred.
  #
  # gpt-oss-20b-inproc:
  #   backend: inproc
  #   upstream_model: gpt-oss:20b
  #   vram_mb: 12992
  #   params:
  #     model_path: "/mnt/c/Users/gopher/.ollama/models/blobs/sha256-e7b273f9636059..."
  #     n_ctx: 4096
  #     n_gpu_layers: 99
  #     flash_attn: true
  #     cache_type_k: "q8_0"
  #     cache_type_v: "q8_0"

  # ---- vLLM entries ---------------------------------------------------------
  #
  # vLLM (Option B) uses FlashInfer's fused MoE CUDA kernels and chunked prefill.
  # On Ada (sm_89), its MoE dispatch is far better than llama.cpp b9780 for
  # qwen3.6:35b and gpt-oss:20b. Requires scripts/08-vllm.sh to install and
  # start the systemd units before the gateway loads these entries.
  #
  # Port assignments (must match 08-vllm.sh):
  #   8100 - qwen3-35b-vllm
  #   8101 - gpt-oss-20b-vllm
  #
  # vLLM does not yet support the hybrid SSM architecture (qwen3.6:27b), so
  # that model stays on Ollama or inproc.

  # qwen3.6:35b via vLLM. Expected: >175 tok/s (>1x Ollama) with FlashInfer.
  # Run: systemctl start vllm-qwen3-35b
  #
  # qwen3-35b-vllm:
  #   backend: vllm
  #   base_url: "http://127.0.0.1:8100"
  #   upstream_model: "Qwen/Qwen3-30B-A3B-Instruct"
  #   vram_mb: 22000
  #   params:
  #     gpu_memory_utilization: "0.85"
  #     max_model_len: 32768
  #     enforce_eager: false

  # gpt-oss:20b via vLLM. Expected: >170 tok/s (>1x Ollama) with FlashInfer MoE.
  # Run: systemctl start vllm-gpt-oss-20b
  #
  # gpt-oss-20b-vllm:
  #   backend: vllm
  #   base_url: "http://127.0.0.1:8101"
  #   upstream_model: "openai-community/gpt-oss-20b"
  #   vram_mb: 14000
  #   params:
  #     gpu_memory_utilization: "0.70"
  #     max_model_len: 32768
  #     enforce_eager: false

manager:
  hot_swap: true          # unload the outgoing model before loading the next
  vram_budget_mb: 22528   # 22 GB minus a 512 MiB margin on the 24 GB card
  queue_max: 32           # requests allowed to wait behind an in-flight swap
  drain_timeout_s: 120    # how long to wait for in-flight requests before a swap
  load_timeout_s: 300     # process-driven backends (vLLM) can take minutes to load
  unload_timeout_s: 30

logging:
  level: info
  format: json
  file: "/var/log/llmgw/requests.log"  # empty logs to stdout instead
  rotate_mb: 100
  keep_files: 5
